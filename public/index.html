<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover'>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href='https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Space+Mono:wght@400;700&display=swap' rel='stylesheet'>

<style>
:root { 
    --neon-red: #ff003c; 
    --neon-gold: #FFD700; 
    --dark-bg: #1a0005; 
    --body-gradient: linear-gradient(135deg, #33000b 0%, #1a0005 50%, #0a0002 100%); 
}
* { 
    margin: 0; 
    padding: 0; 
    box-sizing: border-box; 
    user-select: none; 
    -webkit-tap-highlight-color: transparent; 
}
body { 
    background: var(--dark-bg); 
    width: 100vw; 
    height: 100vh; 
    font-family: 'Orbitron', sans-serif; 
    overflow: hidden;
    position: fixed;
}

/* Splash Screen */
#splashScreen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: var(--body-gradient);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 2000;
    animation: fadeOut 0.5s ease 2.5s forwards;
}

.splash-logo {
    width: 120px;
    height: 120px;
    background: var(--body-gradient);
    border-radius: 50%;
    border: 3px solid var(--neon-red);
    box-shadow: 0 0 50px rgba(255,0,60,0.8), inset 0 0 30px rgba(255,0,60,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    animation: pulse 1.5s infinite, float 3s ease-in-out infinite;
    margin-bottom: 30px;
    overflow: hidden;
}

.splash-logo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.95;
}

.splash-text {
    color: var(--neon-gold);
    font-size: 28px;
    font-weight: 900;
    text-shadow: 0 0 20px var(--neon-gold);
    letter-spacing: 4px;
    margin-bottom: 15px;
    animation: glowPulse 2s infinite;
}

.splash-sub {
    color: var(--neon-red);
    font-size: 14px;
    text-shadow: 0 0 10px var(--neon-red);
    letter-spacing: 2px;
}

.loader {
    width: 200px;
    height: 4px;
    background: rgba(255,0,60,0.2);
    border-radius: 4px;
    margin-top: 40px;
    overflow: hidden;
    position: relative;
}

.loader::after {
    content: '';
    position: absolute;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, var(--neon-red), var(--neon-gold), var(--neon-red), transparent);
    animation: load 2s linear forwards;
}

/* Login Screen */
#loginScreen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: var(--body-gradient);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1500;
    padding: 20px;
}

.login-box {
    width: 90%;
    max-width: 320px;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
    border: 2px solid var(--neon-red);
    border-radius: 30px;
    padding: 30px 20px;
    box-shadow: 0 0 50px rgba(255,0,60,0.3), inset 0 0 30px rgba(255,0,60,0.2);
    animation: slideUp 0.5s ease;
}

.login-title {
    color: var(--neon-gold);
    font-size: 24px;
    font-weight: 900;
    text-align: center;
    margin-bottom: 10px;
    text-shadow: 0 0 15px var(--neon-gold);
    letter-spacing: 2px;
}

.login-sub {
    color: var(--neon-red);
    font-size: 12px;
    text-align: center;
    margin-bottom: 30px;
    text-shadow: 0 0 8px var(--neon-red);
}

.ad-counter {
    background: rgba(255,0,60,0.1);
    border: 1px solid var(--neon-red);
    border-radius: 50px;
    padding: 15px;
    margin-bottom: 25px;
    text-align: center;
}

.counter-text {
    color: #fff;
    font-size: 14px;
    margin-bottom: 5px;
}

.counter-number {
    color: var(--neon-gold);
    font-size: 32px;
    font-weight: 900;
    text-shadow: 0 0 20px var(--neon-gold);
}

.counter-label {
    color: var(--neon-red);
    font-size: 12px;
}

.login-btn {
    width: 100%;
    height: 50px;
    background: linear-gradient(180deg, #1a0005, #000);
    border: 2px solid var(--neon-red);
    border-radius: 25px;
    color: var(--neon-gold);
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 2px;
    cursor: pointer;
    margin-bottom: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-shadow: 0 0 10px var(--neon-gold);
    box-shadow: 0 5px 15px rgba(0,0,0,0.5);
    transition: all 0.2s ease;
}

.login-btn:active {
    transform: scale(0.96);
    background: var(--neon-red);
    color: #fff;
    border-color: #fff;
    box-shadow: 0 0 30px var(--neon-red);
}

.login-btn.disabled {
    opacity: 0.5;
    pointer-events: none;
    border-color: #666;
    color: #666;
}

.login-info {
    color: #888;
    font-size: 11px;
    text-align: center;
    margin-top: 20px;
}

/* Main App */
#miniBtn { 
    width: 70px; 
    height: 70px; 
    background: var(--body-gradient); 
    border-radius: 50%; 
    border: 2.5px solid var(--neon-red); 
    box-shadow: 0 10px 25px rgba(0,0,0,0.9), 0 0 20px rgba(255, 0, 60, 0.8); 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    cursor: pointer; 
    animation: float 3s ease-in-out infinite; 
    overflow: hidden; 
    position: absolute;
    bottom: 30px;
    right: 30px;
    z-index: 100;
}
#miniBtn:active { 
    transform: scale(0.92); 
    box-shadow: 0 5px 15px rgba(0,0,0,0.9), 0 0 30px rgba(255, 0, 60, 1); 
}
#miniBtn img { 
    width: 100%; 
    height: 100%; 
    object-fit: cover; 
    opacity: 0.95; 
}
#main { 
    width: 280px; 
    background: var(--body-gradient); 
    border-radius: 24px; 
    padding: 16px; 
    border: 2px solid var(--neon-red); 
    box-shadow: 0 25px 60px rgba(0,0,0,0.95), 0 0 25px rgba(255,0,60,0.6), inset 0 0 25px rgba(255,0,60,0.3); 
    display: none; 
    flex-direction: column; 
    position: absolute; 
    margin: 0; 
    animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; 
    backdrop-filter: blur(2px); 
    z-index: 1000; 
}
.header { 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    padding-bottom: 10px; 
    cursor: move; 
    margin-bottom: 8px; 
    border-bottom: 1.5px solid rgba(255, 0, 60, 0.5); 
}
.brand-title { 
    font-weight: 900; 
    font-size: 13px; 
    color: var(--neon-gold); 
    text-shadow: 0 0 12px var(--neon-gold); 
    letter-spacing: 2px; 
    display: flex; 
    align-items: center; 
    gap: 6px; 
}
.brand-title::before { 
    content:''; 
    width: 8px; 
    height:8px; 
    background:var(--neon-red); 
    border-radius:50%; 
    box-shadow: 0 0 12px var(--neon-red); 
    animation: pulse 1.2s infinite; 
}
#cls-btn { 
    color: var(--neon-red); 
    font-size: 18px; 
    font-weight: bold; 
    cursor: pointer; 
    text-shadow: 0 0 8px var(--neon-red); 
    padding: 5px 10px; 
}
#cls-btn:active { 
    transform: scale(0.85); 
    color: #fff; 
}
.display-bezel { 
    width: 100%; 
    height: 120px; 
    background: #0a0002; 
    border-radius: 16px; 
    padding: 5px; 
    border: 2px solid var(--neon-red); 
    box-shadow: 0 0 15px rgba(255,0,60,0.4), inset 0 0 25px rgba(255,0,60,0.3); 
    position: relative; 
}
.screen { 
    width: 100%; 
    height: 100%; 
    background: radial-gradient(circle at center, #2a0008 0%, var(--dark-bg) 100%); 
    border-radius: 12px; 
    border: 1px solid rgba(255, 0, 60, 0.6); 
    box-shadow: inset 0 0 20px rgba(255, 0, 60, 0.4); 
    position: relative; 
    overflow: hidden; 
    display: flex; 
    flex-direction: column; 
    justify-content: space-between; 
    padding: 8px 10px; 
}
.screen::after { 
    content: ''; 
    position: absolute; 
    inset: 0; 
    background: repeating-linear-gradient(0deg, rgba(0,0,0,0.5) 0px, rgba(0,0,0,0.5) 1px, transparent 1px, transparent 2px); 
    pointer-events: none; 
    opacity: 0.6; 
}
.screen-top { 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    z-index: 10; 
    width: 100%; 
    white-space: nowrap; 
    overflow: hidden; 
}
.status-led { 
    font-size: 10px; 
    color: var(--neon-red); 
    font-weight: 700; 
    letter-spacing: 1.5px; 
    display: flex; 
    align-items: center; 
    gap: 5px; 
    text-shadow: 0 0 8px var(--neon-red); 
}
.led-dot { 
    width: 6px; 
    height: 6px; 
    background: var(--neon-red); 
    border-radius: 50%; 
    box-shadow: 0 0 12px var(--neon-red); 
    animation: pulse 1.2s infinite; 
}
.period-badge { 
    font-family: 'Space Mono', monospace; 
    font-size: 8px; 
    color: #fff; 
    text-shadow: 0 0 8px rgba(255,255,255,0.7); 
    white-space: nowrap; 
    background: rgba(255,0,60,0.2); 
    padding: 2px 6px; 
    border-radius: 4px; 
    border: 1px solid rgba(255,0,60,0.3); 
}
.res-big { 
    font-weight: 900; 
    font-size: 26px; 
    color: var(--neon-gold); 
    text-shadow: 0 0 20px var(--neon-gold), 0 0 40px rgba(255,215,0,0.5); 
    z-index: 10; 
    text-align: center; 
    white-space: nowrap; 
    letter-spacing: 3px; 
    margin-top: 6px; 
    line-height: 1.2; 
}
.screen-bottom { 
    text-align: center; 
    z-index: 10; 
}
.terminal-text { 
    font-family: 'Space Mono', monospace; 
    font-size: 9px; 
    color: var(--neon-gold); 
    letter-spacing: 1.5px; 
    text-shadow: 0 0 8px var(--neon-gold); 
    background: rgba(0,0,0,0.5); 
    padding: 2px 8px; 
    border-radius: 12px; 
    display: inline-block; 
    border: 1px solid rgba(255,215,0,0.3); 
}
.loading-laser { 
    position: absolute; 
    top: 0; 
    left: -10%; 
    width: 3px; 
    height: 100%; 
    background: #fff; 
    box-shadow: 0 0 20px 8px var(--neon-red); 
    z-index: 8; 
    opacity: 0; 
}
.laser-scan { 
    animation: horizontalScan 1.2s ease-in-out infinite; 
    opacity: 1; 
}
.btn-wrap { 
    display: flex; 
    gap: 8px; 
    margin-top: 12px; 
    width: 100%; 
    height: 38px; 
}
.watch-btn { 
    flex: 3; 
    background: linear-gradient(180deg, #1a0005, #000); 
    border: 1.5px solid #4d0012; 
    border-top: 2px solid #ff4d79; 
    border-radius: 10px; 
    color: var(--neon-gold); 
    font-family: 'Orbitron', sans-serif; 
    font-weight: 700; 
    font-size: 11px; 
    letter-spacing: 1.5px; 
    cursor: pointer; 
    text-shadow: 0 0 10px rgba(255, 215, 0, 0.7); 
    transition: all 0.1s ease; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    box-shadow: 0 5px 8px rgba(0,0,0,0.6); 
    padding: 0 5px; 
}
.watch-btn:active { 
    transform: scale(0.94); 
    background: var(--neon-red); 
    color: #fff; 
    border-color: var(--neon-red); 
    text-shadow: none; 
    box-shadow: 0 0 20px var(--neon-red); 
}
.btn-secondary { 
    flex: 2; 
    color: #ccc; 
    border-top: 2px solid #888; 
    background: linear-gradient(180deg, #1a1a1a, #000); 
    text-shadow: none; 
}
.btn-tg { 
    flex: 1; 
    background: rgba(255, 0, 60, 0.15); 
    border: 1.5px solid #ff003c; 
    border-top: 2px solid #ff4d79; 
    border-radius: 10px; 
    cursor: pointer; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    transition: all 0.1s ease; 
    box-shadow: inset 0 0 15px rgba(255,0,60,0.3); 
}
.btn-tg svg { 
    width: 20px; 
    height: 20px; 
    fill: var(--neon-gold); 
    filter: drop-shadow(0 0 8px var(--neon-gold)); 
}
.btn-tg:active { 
    transform: scale(0.92); 
    background: var(--neon-red); 
}
.btn-tg:active svg { 
    fill: #fff; 
    filter: none; 
}

@keyframes fadeOut {
    to { opacity: 0; visibility: hidden; }
}
@keyframes slideUp {
    from { transform: translateY(50px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}
@keyframes load {
    to { left: 100%; }
}
@keyframes popIn { 
    0% { opacity: 0; transform: scale(0.85); } 
    100% { opacity: 1; transform: scale(1); } 
}
@keyframes float { 
    0%, 100% { transform: translateY(0); } 
    50% { transform: translateY(-8px); } 
}
@keyframes pulse { 
    0%, 100% { opacity: 1; transform: scale(1); } 
    50% { opacity: 0.4; transform: scale(0.8); } 
}
@keyframes horizontalScan { 
    0% { left: -10%; } 
    100% { left: 110%; } 
}
@keyframes glowPulse {
    0%, 100% { text-shadow: 0 0 20px var(--neon-gold); }
    50% { text-shadow: 0 0 40px var(--neon-gold); }
}
.blink { 
    animation: blinker 1s step-end infinite; 
}
@keyframes blinker { 
    50% { opacity: 0; } 
}
</style>
</head>
<body>

<!-- Splash Screen -->
<div id="splashScreen">
    <div class="splash-logo">
        <img src="https://i.ibb.co/Df5Wrp86/1771680996491.png" alt="CALL AI">
    </div>
    <div class="splash-text">CALL AI</div>
    <div class="splash-sub">v2.0.0</div>
    <div class="loader"></div>
</div>

<!-- Login Screen -->
<div id="loginScreen">
    <div class="login-box">
        <div class="login-title">CALL AI</div>
        <div class="login-sub">PREMIUM HACK TOOL</div>
        
        <div class="ad-counter">
            <div class="counter-text">WATCH ADS TO UNLOCK</div>
            <div class="counter-number" id="adCounter">0/5</div>
            <div class="counter-label">ADS WATCHED</div>
        </div>
        
        <button class="login-btn" id="watchAdBtn" onclick="watchAd()">WATCH AD (1/5)</button>
        <button class="login-btn disabled" id="unlockBtn" onclick="unlockApp()" disabled>▶ UNLOCK HACK ◀</button>
        
        <div class="login-info">✓ Watch 5 ads to unlock premium features<br>✓ Each ad takes 30 seconds</div>
    </div>
</div>

<!-- Mini Button -->
<div id='miniBtn' onclick='openM()'>
    <img src='https://i.ibb.co/Df5Wrp86/1771680996491.png' alt='AI' onclick='openM()'>
</div>

<!-- Main App -->
<div id='main'>
    <div class='header' id='dragHeader'>
        <span class='brand-title'>𝓒 𝓐 𝓛 𝓛 </span>
        <div id='cls-btn' onclick='closeM()'>✕</div>
    </div>
    <div class='display-bezel'>
        <div class='screen' id='innerScreen'></div>
    </div>
    <div id='btnArea1' class='btn-wrap'></div>
    <div id='btnArea2' class='btn-wrap'></div>
</div>

<script>
// ==================== CONFIGURATION ====================
var adsWatched = 0;
var isUnlocked = false;
var balance = '500.00';
var state = 'wingo';
var results = {};
var depositPlayed = false;
var numberUnlocked = false;
var sequence = ['SMALL', 'SMALL', 'SMALL', 'SMALL', 'SMALL', 'BIG', 'BIG', 'BIG', 'BIG', 'BIG'];
var tgIcon = "<svg viewBox='0 0 24 24'><path d='M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221l-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.446 1.394c-.16.16-.295.295-.605.295l.213-3.054 5.56-5.022c.242-.213-.054-.333-.373-.121l-6.869 4.326-2.96-.924c-.643-.203-.658-.643.136-.953l11.55-4.458c.535-.199 1.005.128.844.943z'/></svg>";

// ==================== SPLASH SCREEN ====================
setTimeout(function() {
    document.getElementById('splashScreen').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
}, 3000);

// ==================== AD FUNCTIONS ====================
function watchAd() {
    if (adsWatched >= 5) return;
    
    // Show rewarded popup ad
    show_10667523('pop').then(() => {
        // User watched ad successfully
        adsWatched++;
        document.getElementById('adCounter').innerHTML = adsWatched + '/5';
        document.getElementById('watchAdBtn').innerHTML = 'WATCH AD (' + adsWatched + '/5)';
        
        // Show success message
        if (typeof TeamBridge !== 'undefined' && TeamBridge.speak) {
            TeamBridge.speak('Ad watched successfully');
        }
        
        // Check if all ads are watched
        if (adsWatched >= 5) {
            document.getElementById('watchAdBtn').classList.add('disabled');
            document.getElementById('unlockBtn').classList.remove('disabled');
            document.getElementById('unlockBtn').disabled = false;
            document.getElementById('unlockBtn').innerHTML = '▶ UNLOCK NOW ◀';
            
            // Show interstitial ad after unlocking
            show_10667523({
                type: 'inApp',
                inAppSettings: {
                    frequency: 2,
                    capping: 0.1,
                    interval: 30,
                    timeout: 5,
                    everyPage: false
                }
            });
        }
    }).catch(e => {
        console.log('Ad error:', e);
        alert('Failed to load ad. Please try again.');
    });
}

function unlockApp() {
    if (adsWatched >= 5) {
        isUnlocked = true;
        document.getElementById('loginScreen').style.display = 'none';
        
        // Show rewarded interstitial
        show_10667523().then(() => {
            // Welcome ad watched
            console.log('Welcome ad watched');
        });
        
        // Initialize main app
        initMainApp();
    }
}

// ==================== TEAM BRIDGE ====================
var TeamBridge = {
    resizeView: function(w, h) { console.log('resize'); },
    speak: function(t) { console.log(t); },
    loadUrl: function(u) { window.open(u, '_blank'); },
    openExternal: function(u) { window.open(u, '_blank'); },
    playSound: function(s) { console.log(s); }
};

// ==================== MAIN APP FUNCTIONS ====================
function initMainApp() {
    render();
}

function getP() {
    var d = new Date();
    var y = d.getUTCFullYear();
    var m = String(d.getUTCMonth() + 1).padStart(2, '0');
    var day = String(d.getUTCDate()).padStart(2, '0');
    var totalMinutes = d.getUTCHours() * 60 + d.getUTCMinutes();
    var periodSuffix = String(10001 + totalMinutes);
    return y + m + day + '1000' + periodSuffix;
}

function openM() {
    if (!isUnlocked) {
        alert('Please login first by watching 5 ads!');
        document.getElementById('loginScreen').style.display = 'flex';
        return;
    }
    document.getElementById('main').style.display = 'flex';
    document.getElementById('miniBtn').style.display = 'none';
    render();
}

function closeM() {
    document.getElementById('main').style.display = 'none';
    document.getElementById('miniBtn').style.display = 'flex';
}

function startNum() {
    var cleanBal = parseFloat(balance) || 0;
    if(cleanBal >= 500) {
        numberUnlocked = true;
        render();
    } else {
        TeamBridge.loadUrl('https://www.in999ss.com/#/wallet/Recharge');
    }
}

function render() {
    var screen = document.getElementById('innerScreen');
    var b1 = document.getElementById('btnArea1');
    var b2 = document.getElementById('btnArea2');
    var cleanBal = parseFloat(balance) || 0;
    
    if(state == 'scanning' || state == 'result') return;
    
    var mainActionText = numberUnlocked ? 'START NUMBER HACK' : 'INITIATE HACK';
    var btnRow2 = numberUnlocked ? 
        "<div class='btn-tg' onclick=\"TeamBridge.openExternal('https://t.me/+ssUhRmF4Fto5NzA9')\">" + tgIcon + "</div>" : 
        "<button class='watch-btn btn-secondary' onclick='startNum()'>NUM MODE</button><div class='btn-tg' onclick=\"TeamBridge.openExternal('https://t.me/+ssUhRmF4Fto5NzA9')\">" + tgIcon + "</div>";
    
    if(cleanBal < 300) {
        screen.innerHTML = "<div class='screen-top'><div class='status-led'><span class='led-dot'></span> DENIED</div><div class='period-badge'>ERR</div></div><div class='res-big' style='font-size:20px; color:var(--neon-red);'>LOW BAL</div><div class='screen-bottom'><div class='terminal-text' style='color:var(--neon-red);'>DEPOSIT ₹500+</div></div>";
        b1.innerHTML = "<button class='watch-btn' onclick=\"TeamBridge.loadUrl('https://www.in999ss.com/#/wallet/Recharge')\">DEPOSIT NOW</button>";
        b2.style.display = 'none';
    } else {
        if(state === 'wingo') {
            screen.innerHTML = "<div class='screen-top'><div class='status-led' style='color:#777;'><span class='led-dot' style='background:#777; box-shadow:none;'></span> STANDBY</div><div class='period-badge'>ID: -----</div></div><div class='res-big' style='font-size:20px;'>[ READY ]</div><div class='screen-bottom'><div class='terminal-text'>AWAITING INPUT<span class='blink'>_</span></div></div>";
            b1.innerHTML = "<button class='watch-btn' onclick='start()'>" + mainActionText + "</button>";
            b2.style.display = 'flex';
            b2.innerHTML = btnRow2;
        } else {
            screen.innerHTML = "<div class='screen-top'><div class='status-led'><span class='led-dot'></span> MODULE</div><div class='period-badge' style='color:var(--neon-gold);'>AI</div></div><div class='res-big' style='font-size:16px;'>OPEN WINGO</div><div class='screen-bottom'><div class='terminal-text'>SYSTEM READY<span class='blink'>_</span></div></div>";
            b1.innerHTML = "<button class='watch-btn' onclick=\"TeamBridge.loadUrl('https://in999aa.com/#/saasLottery/WinGo?gameCode=WinGo_30S&lottery=WinGo')\">OPEN GAME</button>";
            b2.style.display = 'none';
        }
    }
}

function start() {
    var cp = getP();
    if(results[cp]) {
        showRes(cp);
        return;
    }
    
    state = 'scanning';
    var screen = document.getElementById('innerScreen');
    var b1 = document.getElementById('btnArea1');
    
    b1.innerHTML = "<button class='watch-btn' style='color:#888; pointer-events:none;'>SCANNING...</button>";
    screen.innerHTML = "<div class='screen-top'><div class='status-led'><span class='led-dot'></span> UPLINK</div><div class='period-badge'>...</div></div><div class='loading-laser laser-scan'></div><div class='res-big' style='font-size: 18px;'>DECRYPTING</div><div class='screen-bottom'><div class='terminal-text'>BRUTEFORCE<span class='blink'>_</span></div></div>";
    
    setTimeout(function() {
        var res = sequence[Math.floor(Math.random() * sequence.length)];
        if(numberUnlocked) {
            var num = (res === 'SMALL') ? Math.floor(Math.random()*5) : (Math.floor(Math.random()*5)+5);
            res = res + ' ' + num;
        }
        results[cp] = res;
        showRes(cp);
    }, 2500);
}

function showRes(p) {
    if (state !== 'scanning') return;
    state = 'result';
    var val = results[p];
    var screen = document.getElementById('innerScreen');
    var b1 = document.getElementById('btnArea1');
    var mainActionText = numberUnlocked ? 'START NUMBER HACK' : 'RE-SCAN SYSTEM';
    
    screen.innerHTML = "<div class='screen-top'><div class='status-led'><span class='led-dot'></span> SECURED</div><div class='period-badge'>ID:"+p.slice(-4)+"</div></div><div class='res-big'>"+val+"</div><div class='screen-bottom'><div class='terminal-text'>CONFIDENCE: 98.9%</div></div>";
    b1.innerHTML = "<button class='watch-btn' onclick='start()'>" + mainActionText + "</button>";
    
    setTimeout(function() {
        if(state === 'result') {
            state = 'wingo';
            render();
        }
    }, 3000);
}

// ==================== DRAG FUNCTIONALITY ====================
var dragging = false;
var offsetX, offsetY;
var header = document.getElementById('dragHeader');
var main = document.getElementById('main');

header.onmousedown = function(e) {
    dragging = true;
    offsetX = e.clientX - main.offsetLeft;
    offsetY = e.clientY - main.offsetTop;
};

document.onmouseup = function() {
    dragging = false;
};

document.onmousemove = function(e) {
    if(dragging) {
        main.style.left = (e.clientX - offsetX) + 'px';
        main.style.top = (e.clientY - offsetY) + 'px';
        main.style.position = 'absolute';
    }
};

header.ontouchstart = function(e) {
    dragging = true;
    var touch = e.touches[0];
    offsetX = touch.clientX - main.offsetLeft;
    offsetY = touch.clientY - main.offsetTop;
    e.preventDefault();
};

document.ontouchmove = function(e) {
    if(dragging) {
        var touch = e.touches[0];
        main.style.left = (touch.clientX - offsetX) + 'px';
        main.style.top = (touch.clientY - offsetY) + 'px';
        main.style.position = 'absolute';
        e.preventDefault();
    }
};

document.ontouchend = function() {
    dragging = false;
};
