<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOTEX Matrix AI</title>

<script src='//libtl.com/sdk.js' data-zone='10667523' data-sdk='show_10667523'></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>
<div class="app">

    <!-- MONETAG TOP AD PLACEHOLDER -->
    <div id="monetag-top"></div>

    <div class="header">
        <h1>NOTEX AI</h1>
        <a href="https://t.me/YOUR_CHANNEL_LINK" target="_blank" class="telegram-btn">
            📢
        </a>
    </div>

    <div class="card prediction-card">
        <h3>Next Prediction</h3>
        <div id="prediction" class="prediction-number">--</div>
        <div id="confidence" class="confidence">Confidence: --%</div>
    </div>

    <div class="card chart-card">
        <canvas id="trendChart"></canvas>
    </div>

    <div class="card unlock-card">
        <button onclick="watchAd(10)">Watch 1 Ad → 10 Min</button>
        <button onclick="watchAd(30)">Watch 2 Ads → 30 Min</button>
        <div id="timer" class="timer">Access Locked</div>
    </div>

    <!-- MONETAG BOTTOM AD PLACEHOLDER -->
    <div id="monetag-bottom"></div>

</div>

<script src="script.js"></script>
</body>
</html>
